[platformio]
src_dir = main

[env:esp32-s3-devkitm-1]
platform   = espressif32@6.9.0   ; pins ESP-IDF 5.2.x — stable
board     = esp32-s3-devkitm-1
framework = espidf
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.defaults"
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
build_type = release
build_flags =
    -DESP_PLATFORM
    -DCORE_DEBUG_LEVEL=0
    -I${platformio.packages_dir}/framework-espidf@3.50301.0/components/driver/include
    -I${platformio.packages_dir}/framework-espidf@3.50301.0/components/esp_driver_gpio/include
    -I${platformio.packages_dir}/framework-espidf@3.50301.0/components/esp_driver_ledc/include
board_build.flash_size = 8MB
board_build.partitions = partitions_singleapp_large.csv
upload_port = COM10
monitor_port = COM10
upload_speed = 115200
